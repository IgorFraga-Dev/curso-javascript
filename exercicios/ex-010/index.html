<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
            text-align: center;
        }
        input {
            font-size: 1em;
        }
    </style>
</head>
<body>
     <h1>Sistema de multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> Km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>
    <script>
     function calcular() {
     var txtv = document.getElementById('txtvel')
     var res = document.getElementById('res')
     var vel = Number(txtv.value)
      res.innerHTML = `Sua velocidade atual é de <strong>${vel}km/h/<strong><br><br>`
        if (vel > 60) {
            res.innerHTML = `<p> voce foi multado por excesso de velocidade <p>`
        }
        else {
            res.innerHTML = `<p> A quilometragem esta de acordo com rodovia<p>`
            
        }

       res.innerHTML += `Dirija sempre com cinto de Segurança`
     }
    </script>
</body>
</html>
